
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtd-app-deployment
  labels:
    app: mtd-app
    tenant: client-001 # client code
spec:
  replicas: 2 # immediate scalability: if more is needed, simply increase the number
  selector:
    matchLabels:
      app: mtd-app
  template:
    metadata:
      labels:
        app: mtd-app
    spec:
      containers:
      - name: mtd-container
        image: ghcr.io/dxmssd/security-mtd:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
      imagePullSecrets:
      - name: ghcr-auth
          
